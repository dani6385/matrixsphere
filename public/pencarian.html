<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pencarian Produk - MatrixSphere</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ui-light.css">
    <link rel="stylesheet" href="css/header.css">
</head>

<body class="bg-slate-900 text-white font-sans">
    <header class="main-header">
        <div class="nav-container">
            <a href="index.html" class="nav-logo text-bold text-white">
                <img src="img/logo.png" alt="Logo" class="h-10"></a>
            <span class="ml-4 font-bold text-sky-400 uppercase tracking-widest">MatrixSphere</span>
            
            <div class="search-bar">
                <input type="text" id="searchInput" class="form-control" placeholder="Cari produk lainnya...">
            </div>

            <div class="nav-actions">
                <a id="notifIcon" href="notifikasi.html" class="btn-notif text-white hidden" style="text-decoration: none;">🔔</a>
                <a id="chatIcon" href="chat.html" class="btn-notif text-white hidden" style="text-decoration: none;">💬 </a>
                <a id="cartIcon" href="cart.html" class="btn-notif text-white hidden" style="text-decoration: none;">🛒</a>
                
                <!-- Dropdown Profil -->
                <div style="position: relative;" id="profileSection">
                    <button id="authBtn" class="btn bg-primary pd-l-10 pd-r-10" style="display: flex; align-items: center; height: 40px;">MASUK</button>
                    <div id="profileDropdown" class="profile-dropdown">
                        <div class="flex flex-col items-center pb-3 border-b border-white/10">
                            <img id="userPhoto" src="img/logo.png" class="profile-avatar mb-2" alt="Avatar">
                            <h4 id="userNameDisplay" class="text-sm font-bold text-white truncate w-full text-center">Memuat...</h4>
                            <p id="userEmail" class="text-[10px] text-slate-400 truncate w-full text-center">email@user.com</p>
                        </div>
                        <div class="flex flex-col gap-1 mt-2">
                            <a href="profile.html" class="flex items-center gap-3 px-3 py-2 hover:bg-white/5 rounded-lg no-underline text-white text-sm">
                                <span class="text-sky-400">🛍️</span> ShopSphere Saya
                            </a>
                            <a href="orders.html" class="flex items-center gap-3 px-3 py-2 hover:bg-white/5 rounded-lg no-underline text-white text-sm">
                                <span class="text-sky-400">📄</span> Nota Digital
                            </a>
                            <button id="logoutBtn" class="flex items-center gap-3 px-3 py-2 hover:bg-red-500/10 text-red-400 rounded-lg text-sm w-full text-left">
                            <span>🚪</span> Keluar Akun
                        </button>
                        </div>
                    </div>
                </div>
                <a href="index.html" class="btn bg-secondary pd-l-10 pd-r-10">KEMBALI</a>
            </div>
        </div>
    </header>

    <main class="index-content container">
        <div class="mr-b-10">
            <h2 class="text-blue" style="font-size: 1.5rem;">
                <span id="searchResultTitle" style="border-left: 4px solid #20a8d8; padding-left: 10px;">Hasil Pencarian</span>
            </h2>
            <p id="searchStats" class="text-secondary mr-t-5">Memuat produk...</p>
        </div>

        <div class="row" id="productGrid">
            <!-- Hasil pencarian akan dirender di sini melalui JavaScript -->
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { monitorGudang } from './js/inventory-manager.js';

        const firebaseConfig = {
            apiKey: "AIzaSyApICU6wUb1dkvHhVDBhsDk9bwVMWAVKeo",
            authDomain: "matrixsphere-shop.firebaseapp.com",
            databaseURL: "https://matrixsphere-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "matrixsphere-shop",
            storageBucket: "matrixsphere-shop.firebasestorage.app",
            messagingSenderId: "639761938336",
            appId: "1:639761938336:web:347c97b498ddb1efd156c5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const notifIcon = document.getElementById('notifIcon');
        const chatIcon = document.getElementById('chatIcon');
        const cartIcon = document.getElementById('cartIcon');
        const authBtn = document.getElementById('authBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const logoutBtn = document.getElementById('logoutBtn');
        const userPhoto = document.getElementById('userPhoto');
        const userEmail = document.getElementById('userEmail');
        const userNameDisplay = document.getElementById('userNameDisplay');

        authBtn.addEventListener('click', (e) => {
            if (!auth.currentUser) { window.location.href = 'login.html'; }
        });

        logoutBtn.onclick = async () => {
            if (confirm("Keluar dari akun?")) {
                await signOut(auth); window.location.reload();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                notifIcon.classList.remove('hidden');
                chatIcon.classList.remove('hidden');
                cartIcon.classList.remove('hidden');
                authBtn.innerText = (user.displayName || 'USER') + ' ▾';
                userEmail.innerText = user.email;
                userNameDisplay.innerText = user.displayName || 'Pengguna ShopSphere';
                userPhoto.src = user.photoURL || 'img/logo.png';
            } else {
                notifIcon.classList.add('hidden');
                chatIcon.classList.add('hidden');
                cartIcon.classList.add('hidden');
                authBtn.innerText = 'MASUK';
                authBtn.style.display = 'block'; // Pastikan tombol MASUK terlihat
            }
        });

        const productGrid = document.getElementById('productGrid');
        const searchInput = document.getElementById('searchInput');
        const searchResultTitle = document.getElementById('searchResultTitle');
        const searchStats = document.getElementById('searchStats');

        window.updateCartBadge = () => {
            const cartCountEl = document.getElementById('cart-count');
            if (!cartCountEl) return;
            const keranjang = JSON.parse(localStorage.getItem('grup_keranjang')) || [];
            const totalItems = keranjang.reduce((sum, item) => sum + item.quantity, 0);
            cartCountEl.innerText = totalItems;
            cartCountEl.style.display = totalItems > 0 ? 'flex' : 'none';
        };

        window.tambahKeKeranjang = (idProduk, nama, harga, gambar) => {
            let keranjang = JSON.parse(localStorage.getItem('grup_keranjang')) || [];
            let index = keranjang.findIndex(p => p.id === idProduk);

            if (index > -1) {
                keranjang[index].quantity += 1;
            } else {
                keranjang.push({
                    id: idProduk,
                    nama: nama,
                    harga: harga,
                    img: gambar || 'img/logo.png',
                    quantity: 1
                });
            }
            localStorage.setItem('grup_keranjang', JSON.stringify(keranjang));
            window.updateCartBadge();
            window.location.href = 'cart.html';
        };

        let allProducts = [];

        // 1. Cek apakah ada kata kunci di alamat URL (Contoh: pencarian.html?q=voucher)
        const urlParams = new URLSearchParams(window.location.search);
        let initialQuery = urlParams.get('q') || "";
        if (initialQuery) {
            searchInput.value = initialQuery;
        }

        // 2. Ambil data dari Firebase secara Realtime
        monitorGudang((products) => {
            allProducts = products;
            performSearch(searchInput.value);
            updateCartBadge();
        });

        // Menangani penekanan tombol Enter di halaman pencarian untuk melakukan pencarian baru
        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const term = e.target.value.trim();
                if (term) window.location.href = `pencarian.html?q=${encodeURIComponent(term)}`;
            }
        });

        // 3. Jalankan pencarian saat mengetik
        searchInput.addEventListener('input', (e) => {
            performSearch(e.target.value);
        });

        function performSearch(term) {
            const lowTerm = term.toLowerCase().trim();
            
            const filtered = allProducts.filter(p => 
                p.nama.toLowerCase().includes(lowTerm) || 
                (p.kategori && p.kategori.toLowerCase().includes(lowTerm)) ||
                (p.detail && p.detail.toLowerCase().includes(lowTerm))
            );

            if (lowTerm) {
                searchResultTitle.innerText = `Hasil pencarian: "${term}"`;
            } else {
                searchResultTitle.innerText = "Semua Produk";
            }

            searchStats.innerText = `Menampilkan ${filtered.length} produk ditemukan.`;
            renderProducts(filtered);
        }

        function renderProducts(items) {
            if (items.length === 0) {
                productGrid.innerHTML = `
                    <div class="col-12 text-center mr-t-20">
                        <p class="text-secondary">Maaf, produk yang Anda cari tidak tersedia saat ini.</p>
                        <a href="index.html" class="text-blue">Kembali ke Katalog Utama</a>
                    </div>`;
                return;
            }

            productGrid.innerHTML = items.map(item => {
                const originalImg = item.img || 'img/logo.png';
                const urlGambarAman = originalImg.startsWith('http') 
                    ? `https://images.weserv.nl/?url=${originalImg.replace(/^https?:\/\//, '')}` 
                    : originalImg;
                return `
                <div class="col-3 mr-b-10">
                <a href="view.html?id=${item.id}" style="text-decoration:none; color:inherit; display:block;">
                    <div class="card bg-white text-dark" style="height:100%;">
                        <div class="card-body text-center" style="padding-bottom: 25px;">
                            <img src="${urlGambarAman}" style="width:100%; height:180px; object-fit:cover; border-radius:5px;" onerror="this.onerror=null;this.src='img/logo.png';">
                            <h3 class="mr-t-10" style="font-size: 1.1rem;">${item.nama}</h3>
                            <p class="text-primary text-bold">Rp ${Number(item.harga).toLocaleString('id-ID')}</p>
                        </div>
                    </div>
                </a>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
