<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MatrixSphere - Shop</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ui-light.css">
    <link rel="stylesheet" href="css/header.css">
    <style>
        /* Mencegah konflik flexbox dari style.css yang merusak baris produk */
        body { display: block !important; }
        #navbar-container { position: relative; z-index: 1000; }
    </style>
</head>

<body class="bg-slate-900 text-white font-sans">
    <div id="navbar-container"></div>

    <main class="index-content container">
        <div class="text-center mb-10">
            <h1 class="text-sky-400 font-extrabold tracking-tighter" style="font-size: 3rem;">Selamat Datang di MatrixSphere</h1>
            <p class="text-slate-400 text-lg">Warung Digital & Layanan Hotspot Anda</p>
        </div>

        <!-- Baris Tombol Kategori (Pills) -->
        <div class="card bg-slate-800/50 backdrop-blur-md pd-15 mb-10 border border-white/5 rounded-2xl">
            <h2 class="text-sky-400 mb-4 flex items-center" style="font-size: 1.2rem;">
                <span id="selectedCategoryTitle" style="border-left: 4px solid #20a8d8; padding-left: 12px;">Pilih Kategori</span>
            </h2>
            <div id="categoryContainer" class="category-scroll-wrapper py-2">
                <!-- Kategori Pills akan dimuat di sini -->
            </div>
        </div>

        <!-- Grid Produk -->
        <div class="row" id="productGrid">
            <div class="col-12 text-center py-20 opacity-50 italic">Memuat produk ShopSphere...</div>
        </div>
    </main>

    <script type="module">
        // Gunakan auth dari loader agar tidak inisialisasi ulang
        import { auth } from './js/navbar-loader.js';
        import { monitorGudang } from './js/inventory-manager.js';

        const categoryContainer = document.getElementById('categoryContainer');
        const productGrid = document.getElementById('productGrid');
        const selectedCategoryTitle = document.getElementById('selectedCategoryTitle');

        let allProducts = [];

        monitorGudang((products) => {
            allProducts = products;
            const categories = ['Semua', ...new Set(products.map(p => p.kategori))];
            
            // Render kategori pill yang bisa digeser
            categoryContainer.innerHTML = categories.map(cat => `
                <button class="category-pill bg-primary text-white radius-5" onclick="window.location.href='kategori.html?c=${encodeURIComponent(cat)}'">
                    ${cat}
                </button>
            `).join('');

            renderProducts(products);
        });

        window.filterByCategory = (category) => {
            selectedCategoryTitle.innerText = category;
            const filtered = category === 'Semua' 
                ? allProducts 
                : allProducts.filter(p => p.kategori === category);
            renderProducts(filtered);
        };

        // Catatan: Logika pencarian navbar kini ditangani oleh navbar-loader.js

        // FUNGSI UPDATE BADGE KERANJANG
        window.updateCartBadge = () => {
            const cartCountEl = document.getElementById('cart-count');
            if (!cartCountEl) return;
            const keranjang = JSON.parse(localStorage.getItem('grup_keranjang')) || [];
            const totalItems = keranjang.reduce((sum, item) => sum + item.quantity, 0);
            
            cartCountEl.innerText = totalItems;
            cartCountEl.style.display = totalItems > 0 ? 'flex' : 'none';
        };

        function renderProducts(items) {
            productGrid.innerHTML = items.map(item => {
                const originalImg = item.img || 'img/logo.png';
                const urlGambarAman = originalImg.startsWith('http') 
                    ? `https://images.weserv.nl/?url=${originalImg.replace(/^https?:\/\//, '')}` 
                    : originalImg;
                return `
                <div class="col-3 mr-b-10">
                <a href="view.html?id=${item.id}" style="text-decoration:none; color:inherit; display:block;">
                    <div class="card bg-white text-dark" style="height:100%;">
                        <div class="card-body text-center" style="padding-bottom: 25px;">
                            <img src="${urlGambarAman}" style="width:100%; height:180px; object-fit:cover; border-radius:5px;" onerror="this.onerror=null;this.src='img/logo.png';">
                            <h3 class="mr-t-10" style="font-size: 1.1rem;">${item.nama}</h3>
                            <p class="text-primary text-bold">Rp ${Number(item.harga).toLocaleString('id-ID')}</p>
                        </div>
                    </div>
                </a>
                </div>`;
            }).join('');
        }

        // FUNGSI TAMBAH KE KERANJANG SESUAI REQUEST
        window.tambahKeKeranjang = (idProduk, nama, harga, gambar) => {
            let keranjang = JSON.parse(localStorage.getItem('grup_keranjang')) || [];
            let index = keranjang.findIndex(p => p.id === idProduk);

            if (index > -1) {
                keranjang[index].quantity += 1;
            } else {
                keranjang.push({
                    id: idProduk,
                    nama: nama,
                    harga: harga,
                    img: gambar || 'img/logo.png',
                    quantity: 1
                });
            }

            localStorage.setItem('grup_keranjang', JSON.stringify(keranjang));
            window.updateCartBadge();
            window.location.href = 'cart.html';
        };

        // --- LOGIKA AUTO SCROLL KATEGORI ---
        let scrollInterval;
        function startAutoScroll() {
            scrollInterval = setInterval(() => {
                if (categoryContainer && categoryContainer.scrollWidth > categoryContainer.clientWidth) {
                    categoryContainer.scrollLeft += 1;
                    // Kembali ke awal jika sudah mencapai batas akhir scroll untuk efek looping
                    if (categoryContainer.scrollLeft >= (categoryContainer.scrollWidth - categoryContainer.clientWidth)) {
                        categoryContainer.scrollLeft = 0;
                    }
                }
            }, 40); // Menyesuaikan kecepatan scroll (semakin kecil angka, semakin cepat)
        }

        // Berhenti otomatis saat mouse hover agar user mudah memilih kategori
        categoryContainer.addEventListener('mouseenter', () => clearInterval(scrollInterval));
        categoryContainer.addEventListener('mouseleave', startAutoScroll);

        startAutoScroll();

        // Jalankan saat pertama kali dimuat
        updateCartBadge();
    </script>
    <script type="module" src="js/navbar-loader.js"></script>
</body>

</html>
