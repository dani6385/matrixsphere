<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>MatrixSphere - Shop</title>
        <!-- Favicon MatrixSphere -->
        <link rel="icon" type="image/png" href="img/favicon.png">
        <link rel="stylesheet" href="css/background.css">
        <!-- Tailwind via CDN agar tidak perlu Laravel Mix/Vite -->
        <script src="https://cdn.tailwindcss.com"></script>
        
        <!-- Menghubungkan CSS manual untuk Header & Glassmorphism -->
        <link href="css/background.css" rel="stylesheet">

        <style>
            /* Tambahan agar konten tidak tertutup header fixed */
            .index-content {
                padding-top: 100px;
                min-height: 100vh;
            }
            body {
                background-color: #0f172a; /* Warna slate-900 */
            }
        </style>
    </head>
    <body class="text-white">

        <!-- HEADER FIXED MATRIXSPHERE -->
        <nav class="nav-bar-split">
            <div class="nav-group-left">
                <a href="index.html">
                    <!-- Path gambar langsung ke folder img -->
                    <img src="img/logo_shop.png" alt="MatrixSphere Logo" class="auth-logo-nav">
                </a>
            </div>
<div id="nav-menu" class="w-full block flex-grow lg:flex lg:items-center lg:w-auto hidden">
    <div class="text-sm lg:flex-grow font-semibold">
        
        <div class="relative group block mt-4 lg:inline-block lg:mt-0 mr-6">
            <button class="flex items-center text-slate-300 group-hover:text-sky-400 transition font-semibold outline-none">
                Kategori
                <svg class="w-4 h-4 ml-1 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
            </button>

            <div class="absolute left-0 mt-2 w-48 rounded-xl bg-slate-900/95 backdrop-blur-xl border border-white/10 shadow-2xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                <div class="py-2">
    <a href="kategori.html?type=pakaian-anak" class="block px-4 py-2 text-sm text-slate-300 hover:bg-sky-500/20 hover:text-sky-400 transition">
        Pakaian Anak
    </a>
    <a href="kategori.html?type=voucher-game" class="block px-4 py-2 text-sm text-slate-300 hover:bg-sky-500/20 hover:text-sky-400 transition">
        Voucher Game
    </a>
    <a href="kategori.html?type=elektronik" class="block px-4 py-2 text-sm text-slate-300 hover:bg-sky-500/20 hover:text-sky-400 transition">
        Elektronik
    </a>
</div>
            </div>
        </div>
        </div>
</div>
            <!-- SEARCH BAR PANJANG -->
            <div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="Cari produk di MatrixSphere..." 
           onkeypress="if(event.key === 'Enter') window.location.href='search.html?q=' + this.value">
</div>

<div id="categoryContainer" class="flex flex-wrap gap-3">
    <button class="filter-btn px-6 py-2 rounded-full bg-sky-600 text-white font-bold text-sm transition hover:bg-sky-500" data-category="all">Semua</button>
    </div>

            <!-- IKON NAVIGASI (Manual, pengganti Livewire) -->
            <div class="nav-icons flex space-x-4">
                <a href="cart.html"><img src="img/cart.png" alt="Cart" class="w-6 h-6 invert"></a>
                <a href="notifications.html"><img src="img/bell.png" alt="Notif" class="w-6 h-6 invert"></a>
                <a href="chat.html"><img src="img/chat.png" alt="Chat" class="w-6 h-6 invert"></a>
            </div>
        </nav>
        
        <!-- KONTEN UTAMA -->
        <div class="index-content container mx-auto px-4">
            <div class="text-center">
                <h1 class="text-4xl font-bold text-sky-400">Selamat Datang di MatrixSphere</h1>
                <p class="text-slate-400 mt-2">Warung Digital & Layanan Hotspot Anda</p>
            </div>
<div class="mb-10">
    <h2 class="text-xl font-bold text-sky-400 mb-4 flex items-center">
        <span class="w-2 h-8 bg-sky-500 rounded-full mr-3"></span>
        Semua Kategori
    </h2>
    <div id="categoryContainer" class="flex flex-wrap gap-3">
        <button onclick="filterByCategory('all')" class="px-6 py-2 rounded-full bg-sky-600 text-white font-bold text-sm transition hover:bg-sky-500">Semua</button>
    </div>
</div>

<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6" id="productGrid">
    </div>
            <!-- NAVIGASI HALAMAN (PAGINATION) -->
<div class="flex justify-center mt-12">
    <ul class="flex items-center space-x-2 bg-white/5 p-2 rounded-xl border border-white/10" role="navigation">
        
        <!-- Tombol Sebelumnya -->
        <li class="inline-block">
            <button class="px-4 py-2 rounded-lg bg-white/5 text-slate-400 hover:bg-sky-600 hover:text-white transition cursor-not-allowed" aria-label="Previous">
                &lsaquo; <span class="hidden md:inline ml-1">Sebelumnya</span>
            </button>
        </li>

        <!-- Nomor Halaman -->
        <li class="hidden md:inline-block">
            <span class="px-4 py-2 rounded-lg bg-sky-600 text-white font-bold">1</span>
        </li>
        <li class="hidden md:inline-block">
            <a href="#" class="px-4 py-2 rounded-lg hover:bg-white/10 transition">2</a>
        </li>
        <li class="hidden md:inline-block">
            <a href="#" class="px-4 py-2 rounded-lg hover:bg-white/10 transition">3</a>
        </li>

        <!-- Tombol Selanjutnya -->
        <li class="inline-block">
            <a href="#" class="px-4 py-2 rounded-lg bg-white/5 hover:bg-sky-600 transition" aria-label="Next">
                <span class="hidden md:inline mr-1">Selanjutnya</span> &rsaquo;
            </a>
        </li>
    </ul>
</div>
        </div>
        <script type="module" src="js/script.js"></script>
    </body>
</html>
