<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | MatrixSphere</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div id="navbar-container"></div>

    <main class="container mx-auto px-5 pt-32 pb-12 max-w-2xl">
        <div class="glass p-8 rounded-3xl border border-white/10 shadow-2xl">
            <h1 class="text-2xl font-extrabold text-sky-400 mb-6 uppercase tracking-widest">Ringkasan Pesanan</h1>
            
            <div id="checkoutItems" class="space-y-4 mb-8">
                <!-- Pesanan akan dimuat di sini -->
                <p class="text-slate-500 italic">Memproses data pesanan...</p>
            </div>

            <!-- Informasi Lokasi Pengambilan -->
            <div class="mt-6 p-5 bg-sky-500/10 rounded-2xl border border-sky-400/20">
                <div class="flex justify-between items-start mb-3">
                    <div class="flex items-center gap-2">
                        <span class="text-lg">📍</span>
                        <h3 class="text-sky-400 text-[10px] font-bold uppercase tracking-widest">Lokasi Pengambilan (Take Away)</h3>
                    </div>
                    <button id="btnOpenMap" class="bg-white/10 hover:bg-white/20 text-white text-[10px] font-bold py-1 px-3 rounded-lg transition-all border border-white/10 flex items-center gap-1">
                        🗺️ Rute Google Maps
                    </button>
                </div>
                <p id="addressText" class="text-xs text-slate-300 leading-relaxed italic">Memuat alamat toko...</p>
            </div>

            <div class="border-t border-white/10 pt-6">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-slate-400 font-bold uppercase text-xs tracking-wider">Total Harga</span>
                    <span id="finalPrice" class="text-3xl font-bold text-emerald-400">Rp 0</span>
                </div>

                <button id="btnConfirmOrder" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-4 rounded-xl transition shadow-lg uppercase tracking-widest text-sm">
                    Konfirmasi & Pesan (WA)
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { auth, app } from './js/navbar-loader.js';
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const db = getDatabase(app);
        const dbFirestore = getFirestore(app);
        const checkoutItems = document.getElementById('checkoutItems');
        const finalPriceEl = document.getElementById('finalPrice');
        const addressText = document.getElementById('addressText');
        const btnConfirmOrder = document.getElementById('btnConfirmOrder');
        const btnOpenMap = document.getElementById('btnOpenMap');

        let sellerLat = null;
        let sellerLng = null;

        // --- KODE UNTUK MENANGKAP ID DARI URL ---
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('id');
        const qty = parseInt(params.get('qty')) || 1;

        let itemsToOrder = [];

        async function initCheckout() {
            if (!targetId) {
                checkoutItems.innerHTML = "<p class='text-red-400'>ID Pesanan tidak valid.</p>";
                return;
            }

            if (targetId === 'cart') {
                // Ambil data dari keranjang belanja (localStorage)
                itemsToOrder = JSON.parse(localStorage.getItem('grup_keranjang')) || [];
            } else {
                // Ambil data produk tunggal dari Firebase
                try {
                    const snapshot = await get(ref(db, `gudangBarang/${targetId}`));
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        itemsToOrder = [{
                            id: targetId,
                            nama: data.nama,
                            harga: data.harga,
                            quantity: qty
                        }];
                    }
                } catch (e) { console.error(e); }
            }

            // MUAT ALAMAT RESMI TOKO (Bukan data pembeli)
            await loadSellerAddress();
            
            renderSummary();
        }

        async function loadSellerAddress() {
            try {
                // Melakukan fetch data dari koleksi pengaturan admin 'toko_settings'
                const docSnap = await getDoc(doc(dbFirestore, "toko_settings", "lokasi_utama"));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    sellerLat = data.latitude;
                    sellerLng = data.longitude;
                    
                    // Pastikan menampilkan 'alamat' yang diinput oleh Admin di dashboard
                    addressText.innerText = data.alamat || "Alamat belum diatur oleh admin.";
                } else {
                    addressText.innerText = "Alamat toko tidak ditemukan.";
                }
            } catch (e) { addressText.innerText = "Gagal memuat alamat."; }
        }

        function renderSummary() {
            if (itemsToOrder.length === 0) {
                checkoutItems.innerHTML = "<p class='text-slate-400'>Tidak ada item untuk diproses.</p>";
                return;
            }

            let total = 0;
            checkoutItems.innerHTML = itemsToOrder.map(item => {
                const subtotal = item.harga * item.quantity;
                total += subtotal;
                return `
                    <div class="flex justify-between bg-white/5 p-4 rounded-xl border border-white/5">
                        <div>
                            <div class="text-sm font-bold text-white">${item.nama}</div>
                            <div class="text-[10px] text-slate-400">${item.quantity} x Rp ${Number(item.harga).toLocaleString('id-ID')}</div>
                        </div>
                        <div class="text-sky-400 font-bold text-sm">Rp ${subtotal.toLocaleString('id-ID')}</div>
                    </div>`;
            }).join('');

            finalPriceEl.innerText = `Rp ${total.toLocaleString('id-ID')}`;
        }

        // Logika Buka Google Maps dengan Rute Langsung
        btnOpenMap.onclick = () => {
            if (sellerLat && sellerLng) {
                const googleMapsUrl = `https://www.google.com/maps/dir/?api=1&destination=${sellerLat},${sellerLng}`;
                window.open(googleMapsUrl, '_blank');
            } else {
                alert("Koordinat toko belum tersedia.");
            }
        };

        // Logika Pengiriman Pesanan ke WhatsApp
        btnConfirmOrder.onclick = () => {
            if (itemsToOrder.length === 0) return;

            let listProduk = itemsToOrder.map(item => `- ${item.nama} (${item.quantity}x)`).join('%0A');
            let totalHarga = itemsToOrder.reduce((sum, item) => sum + (item.harga * item.quantity), 0);
            
            const phone = "628212968545"; // Nomor WhatsApp Penjual
            const message = `Halo MatrixSphere,%0A%0ASaya ingin memesan (TAKE AWAY):%0A${listProduk}%0A%0A` +
                            `*Total Bayar:* Rp ${totalHarga.toLocaleString('id-ID')}%0A%0A` +
                            `*Catatan:* Pesanan akan saya ambil langsung di lokasi: _${addressText.innerText}_%0A%0A` +
                            `Mohon dikonfirmasi ketersediaannya, terima kasih!`;

            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        };

        window.onload = initCheckout;
    </script>
    <script type="module" src="js/navbar-loader.js"></script>
</body>
</html>
