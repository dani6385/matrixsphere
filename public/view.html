<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Produk | MatrixSphere</title>
    <link rel="icon" id="faviconLink" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ui-light.css">
    <link rel="stylesheet" href="css/header.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        /* Pastikan body tidak menggunakan flex centering dari style.css agar navbar tidak rusak */
        body { display: block !important; }
        #navbar-container { position: relative; z-index: 1000; width: 100%; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">
    <!-- Container Navbar Modular -->
    <div id="navbar-container"></div>

    <main id="matrix-main-content" style="display: flex !important; justify-content: center !important; align-items: center !important; min-height: 80vh !important; width: 100% !important; float: none !important; margin: 0 auto !important; clear: both !important; padding-top: 120px !important;">
        <div class="glass rounded-3xl overflow-hidden flex flex-col md:flex-row gap-0 mx-auto w-full max-w-5xl my-10" style="float: none !important; margin-left: auto !important; margin-right: auto !important;">
            <div class="bg-white/5 flex items-center justify-center p-5 md:w-1/2">
                <img id="viewImg" src="img/logo.png" class="w-full max-h-[400px] object-contain rounded-2xl shadow-2xl shadow-blue-500/10" onerror="this.onerror=null;this.src='img/logo.png'">
            </div>

            <div class="p-8 md:p-12 flex flex-col md:w-1/2">
                <span id="viewKategori" class="text-blue-400 text-sm font-bold tracking-widest uppercase mb-2">Kategori</span>
                <h1 id="viewNama" class="text-3xl md:text-4xl font-extrabold mb-4">Nama Produk</h1>
                
                <div class="flex items-center gap-4 mb-6">
                    <span class="text-2xl font-bold text-emerald-400" id="viewHarga">Rp 0</span>
                    <span class="px-3 py-1 bg-white/10 rounded-full text-xs" id="viewStok">Stok: 0</span>
                </div>

                <hr class="border-white/10 mb-6">

                <h3 class="text-lg font-semibold mb-2 text-slate-300">Deskripsi Detail</h3>
                <p id="viewDetail" class="text-slate-400 leading-relaxed text-sm md:text-base">
                    Memuat deskripsi...
                </p>

                <!-- Komponen Input Jumlah Pembelian (Quantity Selector) -->
                <div class="mt-auto mt-10 mb-[15px] flex items-center justify-start gap-4 bg-white/5 py-[6px] px-3 rounded-xl border border-white/10 w-fit max-w-[180px] ml-0 mr-auto">
                    <span class="text-white/50 text-[10px] font-bold uppercase tracking-wider">Jumlah:</span>
                    <div class="flex items-center gap-1">
                        <button id="btnMinus" class="w-8 h-8 flex items-center justify-center bg-[#1e293b] border border-white/10 rounded-lg hover:bg-slate-700 transition text-white text-base">
                            -
                        </button>
                        <input type="number" id="inputQty" value="1" readonly 
                            class="w-8 bg-transparent text-center font-bold text-white text-sm focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                        <button id="btnPlus" class="w-8 h-8 flex items-center justify-center bg-[#1e293b] border border-white/10 rounded-lg hover:bg-slate-700 transition text-white text-base">
                            +
                        </button>
                    </div>
                </div>

                <!-- Barisan Tombol Aksi Baru -->
                <div class="flex gap-3 items-center w-full">
                    <!-- Tombol Chat -->
                    <a href="chat.html" class="flex items-center justify-center w-14 h-14 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 hover:border-white/20 transition-all text-xl shadow-lg" title="Tanya Penjual">
                        💬
                    </a>
                    <button id="btnBuyNow" class="flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-emerald-600/20 uppercase tracking-wider text-[10px] md:text-xs lg:text-sm whitespace-nowrap">
                        Beli Langsung
                    </button>
                    <!-- Tombol + Keranjang (Menambah tanpa pindah halaman) -->
                    <button id="btnAddToCart" class="flex-1 bg-sky-500 hover:bg-sky-400 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-sky-500/20 uppercase tracking-wider text-[10px] md:text-xs lg:text-sm whitespace-nowrap">
                        + Keranjang
                    </button>

                    <!-- Tombol Beli Langsung (Menambah & Langsung ke Keranjang) -->
                    
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        // Gunakan auth & app dari loader agar sinkron dan mencegah bentrokan inisialisasi
        import { auth, app } from './js/navbar-loader.js';
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { monitorGudang } from './js/inventory-manager.js';

        const db = getDatabase(app);
        const params = new URLSearchParams(window.location.search);
        const prodId = params.get('id');

        window.updateCartBadge = () => {
            const cartCountEl = document.getElementById('cart-count');
            if (!cartCountEl) return;
            const keranjang = JSON.parse(localStorage.getItem('grup_keranjang')) || [];
            const totalItems = keranjang.reduce((sum, item) => sum + item.quantity, 0);
            
            cartCountEl.innerText = totalItems;
            cartCountEl.style.display = totalItems > 0 ? 'flex' : 'none';
        };

        window.tambahKeKeranjang = (idProduk, nama, harga, gambar, redirect = true, qty = 1) => {
            let keranjang = JSON.parse(localStorage.getItem('grup_keranjang')) || [];
            let index = keranjang.findIndex(p => p.id === idProduk);

            if (index > -1) {
                keranjang[index].quantity += qty;
            } else {
                keranjang.push({
                    id: idProduk,
                    nama: nama,
                    harga: harga,
                    img: gambar || 'img/logo.png',
                    quantity: qty
                });
            }
            localStorage.setItem('grup_keranjang', JSON.stringify(keranjang));
            window.updateCartBadge();
            if (redirect) window.location.href = 'cart.html';
        };

        let currentProductData = null;

        async function loadProductDetail() {
            if (!prodId) {
                alert("Produk tidak ditemukan!");
                return;
            }

            const snapshot = await get(ref(db, `gudangBarang/${prodId}`));
            if (snapshot.exists()) {
                const data = snapshot.val();
                currentProductData = data;

                // Isi data ke HTML
                document.getElementById('viewNama').innerText = data.nama || "Produk Tanpa Nama";
                document.getElementById('viewHarga').innerText = `Rp ${Number(data.harga).toLocaleString('id-ID')}`;
                document.getElementById('viewStok').innerText = `Tersedia: ${data.stok}`;
                document.getElementById('viewKategori').innerText = data.kategori || "Umum";

                // Gunakan proxy weserv agar gambar lebih stabil dan cepat (Direct Link ImgBB)
                const originalImg = data.img || "img/logo.png";
                const urlGambarAman = originalImg.startsWith('http') 
                    ? `https://images.weserv.nl/?url=${originalImg.replace(/^https?:\/\//, '')}` 
                    : originalImg;
                document.getElementById('viewImg').src = urlGambarAman;
                
                // Tambahkan penanganan error gambar di JS
                document.getElementById('viewImg').onerror = function() {
                    this.onerror = null;
                    this.src = 'img/logo.png';
                };
                
                // Menampilkan data deskripsi (prioritas) atau detail jika tersedia
                document.getElementById('viewDetail').innerText = data.deskripsi || data.detail || "Tidak ada deskripsi.";
                
                document.title = `${data.nama} | MatrixSphere`;
            } else {
                document.body.innerHTML = "<div class='text-center mt-20 text-xl text-red-400'>Produk tidak ditemukan di database!</div>";
            }
        }

        // Handle click tombol keranjang
        document.getElementById('btnAddToCart').onclick = (e) => {
            e.preventDefault();
            if (!currentProductData) return;
            const qty = parseInt(document.getElementById('inputQty').value) || 1;

            tambahKeKeranjang(
                prodId, 
                currentProductData.nama, 
                currentProductData.harga, 
                currentProductData.img || 'img/logo.png',
                false, // Jangan pindah halaman
                qty
            );
            alert("Produk berhasil ditambahkan ke keranjang!");
        };

        // Handle click tombol beli langsung
        document.getElementById('btnBuyNow').onclick = (e) => {
            e.preventDefault();
            if (!currentProductData) return;
            const qty = parseInt(document.getElementById('inputQty').value) || 1;

            tambahKeKeranjang(
                prodId, 
                currentProductData.nama, 
                currentProductData.harga, 
                currentProductData.img || 'img/logo.png',
                true, // Langsung pindah ke cart.html
                qty
            );
        };

        // Logika Interaktif Quantity Selector
        const inputQty = document.getElementById('inputQty');
        document.getElementById('btnMinus').onclick = () => {
            let val = parseInt(inputQty.value);
            if (val > 1) inputQty.value = val - 1;
        };
        document.getElementById('btnPlus').onclick = () => {
            let val = parseInt(inputQty.value);
            inputQty.value = val + 1;
        };

        window.onload = () => {
            loadProductDetail();
            updateCartBadge();
        };
    </script>
</body>
</html>
