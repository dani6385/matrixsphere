<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detail Produk - MatrixSphere</title>
    <link rel="icon" type="image/png" href="img/logo_shop.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white">
    <nav class="p-4 border-b border-white/10 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto flex items-center">
            <a href="index.html" class="text-sky-400 flex items-center">
                <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                Kembali ke Beranda
            </a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12">
        <div id="loader" class="text-center text-sky-400">Memuat detail produk...</div>
        
        <div id="productDetail" class="hidden grid grid-cols-1 md:grid-cols-2 gap-12 max-w-6xl mx-auto">
            <div class="rounded-3xl overflow-hidden border border-white/10 bg-slate-800/30">
                <img id="detImage" src="" class="w-full h-auto object-cover">
            </div>

            <div class="space-y-6">
                <h1 id="detName" class="text-4xl md:text-5xl font-black text-white"></h1>
                <div class="inline-block px-4 py-2 bg-sky-500/10 border border-sky-500/20 rounded-2xl">
                    <span id="detPrice" class="text-3xl font-mono text-sky-400"></span>
                </div>
                
                <div class="p-6 bg-white/5 rounded-3xl border border-white/10">
                    <h2 class="text-lg font-bold mb-3 text-slate-300 uppercase tracking-widest">Deskripsi</h2>
                    <p id="detDesc" class="text-slate-400 leading-relaxed"></p>
                </div>

                <div class="flex gap-4">
                    <button class="flex-grow bg-sky-600 hover:bg-sky-500 py-5 rounded-2xl font-black text-xl transition-all active:scale-95 shadow-xl">
                        BELI SEKARANG
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="js/detail.js"></script>
</body>
</html>
