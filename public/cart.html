<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keranjang Belanja | MatrixSphere</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ui-light.css">
    <link rel="stylesheet" href="css/header.css">
    <script type="module" src="js/navbar-loader.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <div id="navbar-container"></div>

    <main class="index-content container">
            <h1 class="text-3xl font-extrabold mb-8 text-sky-400">Keranjang Belanja</h1>
            
            <div id="cartContent" class="space-y-4">
                <!-- Konten Produk Akan Dimuat di Sini -->
                <div class="text-center py-20 opacity-50">Memuat detail pesanan...</div>
            </div>

            <div id="cartSummary" class="mt-10 glass p-8 rounded-3xl hidden">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-slate-400">Total Pembayaran</span>
                    <span id="totalPrice" class="text-3xl font-bold text-emerald-400">Rp 0</span>
                </div>
                <button id="btnCheckout" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl transition shadow-lg shadow-green-600/20 uppercase tracking-widest">
                    Checkout via WhatsApp
                </button>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyApICU6wUb1dkvHhVDBhsDk9bwVMWAVKeo",
            authDomain: "matrixsphere-shop.firebaseapp.com",
            databaseURL: "https://matrixsphere-shop-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "matrixsphere-shop",
            storageBucket: "matrixsphere-shop.firebasestorage.app",
            messagingSenderId: "639761938336",
            appId: "1:639761938336:web:347c97b498ddb1efd156c5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Update tombol navigasi berdasarkan status login
        const notifIcon = document.getElementById('notifIcon');
        const chatIcon = document.getElementById('chatIcon');
        const cartIcon = document.getElementById('cartIcon');
        const authBtn = document.getElementById('authBtn');
        const profileDropdown = document.getElementById('profileDropdown');
        const logoutBtn = document.getElementById('logoutBtn');
        const userPhoto = document.getElementById('userPhoto');
        const userEmail = document.getElementById('userEmail');
        const userNameDisplay = document.getElementById('userNameDisplay');

        authBtn.addEventListener('click', (e) => {
            if (!auth.currentUser) { window.location.href = 'login.html'; }
        });

        logoutBtn.onclick = async () => {
            if (confirm("Keluar dari akun?")) {
                await signOut(auth); window.location.reload();
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                notifIcon.classList.remove('hidden');
                chatIcon.classList.remove('hidden');
                cartIcon.classList.remove('hidden');
                authBtn.innerText = (user.displayName || 'USER') + ' ▾';
                userEmail.innerText = user.email;
                userNameDisplay.innerText = user.displayName || 'Pengguna ShopSphere';
                userPhoto.src = user.photoURL || 'img/logo.png';
            } else {
                notifIcon.classList.add('hidden');
                chatIcon.classList.add('hidden');
                cartIcon.classList.add('hidden');
                authBtn.href = 'login.html';
                authBtn.innerText = 'MASUK';
            }
        });

        const params = new URLSearchParams(window.location.search);
        const prodId = params.get('id');
        
        const cartContent = document.getElementById('cartContent');
        const cartSummary = document.getElementById('cartSummary');
        const totalPriceEl = document.getElementById('totalPrice');
        const btnCheckout = document.getElementById('btnCheckout');

        window.updateCartBadge = () => {
            const cartCountEl = document.getElementById('cart-count');
            if (!cartCountEl) return;
            const currentCart = JSON.parse(localStorage.getItem('keranjang')) || [];
            const totalItems = currentCart.reduce((sum, item) => sum + item.quantity, 0);
            
            cartCountEl.innerText = totalItems;
            cartCountEl.style.display = totalItems > 0 ? 'flex' : 'none';
        };

        let keranjang = JSON.parse(localStorage.getItem('keranjang')) || [];

        function renderCart() {
            if (keranjang.length === 0) {
                cartContent.innerHTML = `
                    <div class="glass p-10 rounded-3xl text-center">
                        <p class="text-slate-400 mb-5">Keranjang Anda kosong.</p>
                        <a href="index.html" class="text-sky-400 font-bold hover:underline">Kembali Belanja</a>
                    </div>`;
                cartSummary.classList.add('hidden');
                return;
            }

            cartSummary.classList.remove('hidden');
            let grandTotal = 0;

            cartContent.innerHTML = keranjang.map((item, index) => {
                const originalImg = item.img || "img/logo.png";
                const urlGambarAman = originalImg.startsWith('http') 
                    ? `https://images.weserv.nl/?url=${originalImg.replace(/^https?:\/\//, '')}` 
                    : originalImg;
                
                const itemTotal = item.harga * item.quantity;
                grandTotal += itemTotal;

                return `
                <div class="glass p-5 rounded-3xl flex flex-col md:flex-row items-center gap-6 mb-4">
                    <img src="${urlGambarAman}" class="w-24 h-24 object-cover rounded-2xl border border-white/10">
                    <div class="flex-grow text-center md:text-left">
                        <h2 class="text-lg font-bold">${item.nama}</h2>
                        <p class="text-sky-400 font-mono">Rp ${Number(item.harga).toLocaleString('id-ID')}</p>
                    </div>
                    <div class="flex items-center bg-white/5 rounded-xl p-1 border border-white/10">
                        <button onclick="updateQty(${index}, -1)" class="w-8 h-8 flex items-center justify-center hover:bg-white/10 rounded-lg transition">-</button>
                        <span class="w-10 text-center font-bold">${item.quantity}</span>
                        <button onclick="updateQty(${index}, 1)" class="w-8 h-8 flex items-center justify-center hover:bg-white/10 rounded-lg transition">+</button>
                    </div>
                    <button onclick="removeItem(${index})" class="text-red-400 hover:text-red-300 p-2">Hapus</button>
                </div>`;
            }).join('');

            totalPriceEl.innerText = `Rp ${grandTotal.toLocaleString('id-ID')}`;
            updateCartBadge();
        }

        window.updateQty = (index, delta) => {
            keranjang[index].quantity += delta;
            if (keranjang[index].quantity < 1) keranjang[index].quantity = 1;
            localStorage.setItem('keranjang', JSON.stringify(keranjang));
            renderCart();
            updateCartBadge();
        };

        window.removeItem = (index) => {
            keranjang.splice(index, 1);
            localStorage.setItem('keranjang', JSON.stringify(keranjang));
            renderCart();
            updateCartBadge();
        };

        btnCheckout.onclick = () => {
            if (keranjang.length === 0) return;
            
            let grandTotal = 0;
            let listProduk = "";
            keranjang.forEach(item => {
                const total = item.harga * item.quantity;
                grandTotal += total;
                listProduk += `- ${item.nama} (${item.quantity}x) = Rp ${total.toLocaleString('id-ID')}%0A`;
            });

            const phone = "6281234567890"; 
            const message = `Halo MatrixSphere, saya ingin memesan:%0A%0A${listProduk}%0A` +
                            `*Total Pembayaran:* Rp ${grandTotal.toLocaleString('id-ID')}%0A%0A` +
                            `Mohon diproses, terima kasih!`;
            
            window.open(`https://wa.me/${phone}?text=${message}`, '_blank');
        };

        window.onload = renderCart;
    </script>
</body>
</html>
