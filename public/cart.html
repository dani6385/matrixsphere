<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Keranjang - MatrixSphere Shop</title>
    
    <!-- Tailwind via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Menghubungkan CSS manual kita -->
    <link href="css/background.css" rel="stylesheet">

    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .content-area { padding-top: 100px; min-height: 100vh; }
    </style>
</head>
<body>

    <!-- HEADER (Sama dengan index.html) -->
    <nav class="nav-bar-split">
        <div class="nav-group-left">
            <a href="index.html">
                <img src="img/logo_shop.png" alt="MatrixSphere" class="auth-logo-nav">
            </a>
        </div>
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Cari di keranjang...">
        </div>
        <div class="nav-icons flex space-x-4">
            <a href="cart.html"><img src="img/cart.png" alt="Cart" class="w-6 h-6 invert"></a>
            <a href="#"><img src="img/bell.png" alt="Notif" class="w-6 h-6 invert"></a>
        </div>
    </nav>

    <!-- ISI HALAMAN KERANJANG -->
    <main class="content-area container mx-auto px-4">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl font-bold text-sky-400 mb-8">Keranjang Belanja</h1>

            <div class="bg-white/5 backdrop-blur-md rounded-2xl border border-white/10 overflow-hidden shadow-2xl">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white/5 text-slate-400 text-xs uppercase tracking-wider">
                            <th class="py-4 px-6 font-bold">Produk</th>
                            <th class="py-4 px-6 font-bold text-center">Jumlah</th>
                            <th class="py-4 px-6 font-bold text-right">Harga</th>
                            <th class="py-4 px-6 font-bold text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/5">
                        <!-- Item 1 -->
                        <tr class="hover:bg-white/5 transition">
                            <td class="py-4 px-6">
                                <span class="font-medium text-white">Voucher Hotspot 3 Jam</span>
                            </td>
                            <td class="py-4 px-6 text-center">1</td>
                            <td class="py-4 px-6 text-right font-mono text-yellow-400">Rp 2.000</td>
                            <td class="py-4 px-6 text-center">
                                <button class="text-red-400 hover:text-red-300 text-xs font-bold bg-red-400/10 px-3 py-1 rounded-lg">Hapus</button>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <!-- Bagian Total & Checkout -->
                <div class="p-8 bg-white/5 border-t border-white/10 flex flex-col md:flex-row justify-between items-center">
                    <div class="mb-6 md:mb-0">
                        <p class="text-slate-400 text-sm">Total Pembayaran:</p>
                        <p class="text-3xl font-bold text-sky-400 font-mono">Rp 2.000</p>
                    </div>
                    
                    <a href="https://wa.me/628xxxxxxx?text=Halo%20MatrixSphere%2C%20saya%20mau%20bayar%20pesanan%20saya" 
                       class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-10 rounded-xl shadow-lg shadow-green-500/20 transition-all transform hover:scale-105">
                        Checkout via WhatsApp
                    </a>
                </div>
            </div>

            <!-- Tombol Kembali -->
            <div class="mt-8 text-center">
                <a href="index.html" class="text-slate-400 hover:text-white transition">← Kembali Belanja</a>
            </div>
        </div>
    </main>

</body>
</html>
