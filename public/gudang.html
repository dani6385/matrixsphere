<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gudang MatrixSphere - Stok Barang</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <nav class="flex items-center justify-between p-4 shadow-lg bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center px-4">
            <a href="index.html"><img src="img/logo_shop.png" alt="Logo" class="h-10"></a>
            <span class="ml-4 font-bold text-sky-400">ADMIN GUDANG</span>
        </div>
        <div class="space-x-4">
            <a href="admin.html" class="bg-sky-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-sky-500 transition">Tambah Barang</a>
        </div>
    </nav>

    <main class="pt-10 pb-12 container mx-auto px-4">
        <div class="bg-slate-800/50 rounded-2xl border border-white/10 p-6 backdrop-blur-sm">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-sky-400">Daftar Stok Barang</h1>
                <span id="totalBarang" class="bg-white/10 px-3 py-1 rounded-full text-xs">Loading...</span>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-white/10 text-slate-400 uppercase text-xs">
                            <th class="p-4">Produk</th>
                            <th class="p-4">Kategori</th>
                            <th class="p-4">Harga</th>
                            <th class="p-4">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryTable">
                        <tr>
                            <td colspan="4" class="p-10 text-center text-slate-500">Mengambil data gudang...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module" src="js/gudang.js"></script>
</body>
</html>
