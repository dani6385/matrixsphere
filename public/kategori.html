<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kategori Produk - MatrixSphere</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ui-light.css">
    <link rel="stylesheet" href="css/header.css">
</head>

<body class="bg-slate-900 text-white font-sans">
    <header class="main-header">
        <div class="nav-container">
            <a href="index.html" class="nav-logo text-bold text-white">
                <img src="img/logo.png" alt="Logo" class="h-10"></a>
            <span class="ml-4 font-bold text-sky-400 uppercase tracking-widest">MatrixSphere</span>
            
            <div class="search-bar">
                <input type="text" id="searchInput" class="form-control" placeholder="Cari produk...">
            </div>

            <div class="nav-actions">
                <a id="notifIcon" href="notifikasi.html" class="btn-notif text-white hidden" style="text-decoration: none;">🔔</a>
                <a id="chatIcon" href="chat.html" class="btn-notif text-white hidden" style="text-decoration: none;">💬 </a>
                <a id="cartIcon" href="cart.html" class="btn-notif text-white hidden" style="text-decoration: none;">🛒</a>
                
                <div style="position: relative;" id="profileSection">
                    <button id="authBtn" class="btn bg-primary pd-l-10 pd-r-10">MASUK</button>
                    <div id="profileDropdown" class="profile-dropdown">
                        <div class="flex flex-col items-center pb-3 border-b border-white/10">
                            <img id="userPhoto" src="img/logo.png" class="profile-avatar mb-2" alt="Avatar">
                            <p id="userEmail" class="text-xs text-slate-400 truncate w-full text-center">email@user.com</p>
                        </div>
                        <a href="profile.html" class="flex items-center gap-3 px-3 py-2 hover:bg-white/5 rounded-lg no-underline text-white text-sm">👤 Profil</a>
                        <button id="logoutBtn" class="flex items-center gap-3 px-3 py-2 hover:bg-red-500/10 text-red-400 rounded-lg text-sm w-full text-left">🚪 Keluar</button>
                    </div>
                </div>
                <a href="index.html" class="btn bg-secondary pd-l-10 pd-r-10">KEMBALI</a>
            </div>
        </div>
    </header>

    <main class="index-content container">
        <div class="mr-b-10">
            <h2 class="text-blue" style="font-size: 1.5rem;">
                <span id="categoryDisplayTitle" style="border-left: 4px solid #20a8d8; padding-left: 10px;">Kategori</span>
            </h2>
            <p id="categoryStats" class="text-secondary mr-t-5">Memuat produk...</p>
        </div>

        <div class="row" id="productGrid">
            <!-- Produk akan dimunculkan di sini -->
        </div>
    </main>

    <script type="module">
        import { auth } from './js/navbar-loader.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { monitorGudang } from './js/inventory-manager.js';

        const notifIcon = document.getElementById('notifIcon');
        const chatIcon = document.getElementById('chatIcon');
        const cartIcon = document.getElementById('cartIcon');
        const authBtn = document.getElementById('authBtn');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                notifIcon.classList.remove('hidden');
                chatIcon.classList.remove('hidden');
                cartIcon.classList.remove('hidden');
                authBtn.innerText = user.displayName || 'PROFIL';
            } else {
                notifIcon.classList.add('hidden');
                chatIcon.classList.add('hidden');
                cartIcon.classList.add('hidden');
                authBtn.innerText = 'MASUK';
            }
        });

        const productGrid = document.getElementById('productGrid');
        const categoryDisplayTitle = document.getElementById('categoryDisplayTitle');
        const categoryStats = document.getElementById('categoryStats');
        const searchInput = document.getElementById('searchInput');

        window.updateCartBadge = () => {
            const cartCountEl = document.getElementById('cart-count');
            if (!cartCountEl) return;
            const keranjang = JSON.parse(localStorage.getItem('grup_keranjang')) || [];
            const totalItems = keranjang.reduce((sum, item) => sum + item.quantity, 0);
            cartCountEl.innerText = totalItems;
            cartCountEl.style.display = totalItems > 0 ? 'flex' : 'none';
        };

        window.tambahKeKeranjang = (idProduk, nama, harga, gambar) => {
            let keranjang = JSON.parse(localStorage.getItem('grup_keranjang')) || [];
            let index = keranjang.findIndex(p => p.id === idProduk);

            if (index > -1) {
                keranjang[index].quantity += 1;
            } else {
                keranjang.push({
                    id: idProduk,
                    nama: nama,
                    harga: harga,
                    img: gambar || 'img/logo.png',
                    quantity: 1
                });
            }
            localStorage.setItem('grup_keranjang', JSON.stringify(keranjang));
            window.updateCartBadge();
            window.location.href = 'cart.html';
        };

        // 1. Ambil Nama Kategori dari URL (?c=NamaKategori)
        const urlParams = new URLSearchParams(window.location.search);
        const targetCategory = urlParams.get('c');

        if (!targetCategory) {
            window.location.href = 'index.html';
        }

        // 2. Tampilkan Nama Kategori di Judul
        categoryDisplayTitle.innerText = targetCategory;

        // 3. Ambil Data dari Firebase
        monitorGudang((products) => {
            // Filter berdasarkan kategori yang dipilih
            const filtered = targetCategory === 'Semua' 
                ? products 
                : products.filter(p => p.kategori === targetCategory);

            categoryStats.innerText = `Ditemukan ${filtered.length} produk dalam kategori ini.`;
            renderProducts(filtered);
            updateCartBadge();
        });
        
        const escapeHTML = (str) => String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));

        function renderProducts(items) {
            if (items.length === 0) {
                productGrid.innerHTML = '<div class="col-12 text-center mr-t-20">Belum ada produk di kategori ini.</div>';
                return;
            }

            productGrid.innerHTML = items.map(item => {
                const originalImg = item.img || 'img/logo.png';
                const urlGambarAman = originalImg.startsWith('http') 
                    ? `https://images.weserv.nl/?url=${originalImg.replace(/^https?:\/\//, '')}` 
                    : originalImg;
                return `
                <div class="col-3 mr-b-10">
                <a href="view.html?id=${encodeURIComponent(item.id)}" style="text-decoration:none; color:inherit; display:block;">
                    <div class="card bg-white text-dark" style="height:100%;">
                        <div class="card-body text-center" style="padding-bottom: 25px;">
                            <img src="${urlGambarAman}" style="width:100%; height:180px; object-fit:cover; border-radius:5px;" onerror="this.onerror=null;this.src='img/logo.png';">
                            <h3 class="mr-t-10" style="font-size: 1.1rem;">${escapeHTML(item.nama)}</h3>
                            <p class="text-primary text-bold">Rp ${Number(item.harga).toLocaleString('id-ID')}</p>
                        </div>
                    </div>
                </a>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
