<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kategori - MatrixSphere Shop</title>
    <link rel="icon" type="image/png" href="img/logo_shop.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="css/background.css" rel="stylesheet">
</head>
<body class="bg-slate-900 text-white font-sans">

    <nav class="nav-bar-split">
        <div class="nav-group-left px-4">
            <a href="index.html"><img src="img/logo_shop.png" alt="Logo" class="auth-logo-nav h-10"></a>
        </div>
        <div class="search-container">
            <input type="text" class="search-input w-full" placeholder="Cari di kategori ini...">
        </div>
        <div class="nav-icons flex space-x-4 px-4">
            <a href="cart.html"><img src="img/cart.png" alt="Cart" class="w-6 h-6 invert"></a>
            <a href="index.html"><img src="img/home.png" alt="Home" class="w-6 h-6 invert"></a>
        </div>
    </nav>

    <main class="pt-28 container mx-auto px-4">
        <div class="mb-8 border-l-4 border-sky-500 pl-4">
            <h1 id="category-title" class="text-3xl font-bold text-sky-400 capitalize">Kategori Produk</h1>
            <p class="text-slate-400">Menampilkan produk terbaik untuk Anda</p>
        </div>

        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white/5 p-6 rounded-2xl border border-white/10 backdrop-blur-sm hover:border-sky-500/50 transition">
                <div class="aspect-square bg-slate-800 rounded-xl mb-4 flex items-center justify-center">
                    <span class="text-slate-500">Foto Produk</span>
                </div>
                <h3 class="text-xl font-semibold">Produk Unggulan</h3>
                <p class="text-2xl font-bold text-yellow-400 mt-2">Rp 50.000</p>
                <button class="w-full mt-4 bg-sky-600 hover:bg-sky-500 py-2 rounded-lg transition font-bold">Tambah ke Keranjang</button>
            </div>
        </div>
    </main>

    <script>
        // Script sederhana untuk mengambil nama kategori dari URL
        const urlParams = new URLSearchParams(window.location.search);
        const category = urlParams.get('type');
        if (category) {
            // Mengubah "pakaian-anak" menjadi "Pakaian Anak"
            const title = category.replace(/-/g, ' ');
            document.getElementById('category-title').innerText = title;
            document.title = title + " - MatrixSphere";
        }
    </script>
</body>
</html>
