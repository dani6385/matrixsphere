<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard - MatrixSphere</title>
    <link rel="icon" type="image/png" href="img/logo_shop.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans">
    <nav class="flex items-center justify-between p-4 shadow-lg bg-slate-900/50 backdrop-blur-md">
        <div class="flex items-center px-4">
            <a href="index.html"><img src="img/logo_shop.png" alt="Logo" class="h-10"></a>
            <span class="ml-4 font-bold text-sky-400">ADMIN PANEL</span>
        </div>
    </nav>

    <main class="pt-20 pb-12 container mx-auto px-4">
        <div class="max-w-xl mx-auto bg-slate-800/50 p-8 rounded-2xl border border-white/10">
            <h1 class="text-2xl font-bold mb-6 text-sky-400">Tambah Produk</h1>
            <form id="productForm" class="space-y-4">
                <input type="text" id="prodName" required placeholder="Nama Produk" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 outline-none">
                <select id="prodCategory" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 outline-none">
                    <option value="pakaian">Pakaian</option>
                    <option value="voucher">Voucher</option>
                </select>
                <input type="number" id="prodPrice" required placeholder="Harga" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 outline-none">
                <div>
    <label class="block text-sm font-semibold mb-2 text-slate-300">Harga</label>
    <input type="number" id="prodPrice" required placeholder="Harga" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-sky-500 transition">
</div>

<div>
    <label class="block text-sm font-semibold mb-2 text-slate-300">Satuan / Grosir</label>
    <select id="prodUnit" class="w-full bg-slate-900 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-sky-500 transition">
        <option value="Saset">1 Saset</option>
        <option value="Renteng">1 Renteng</option>
        <option value="Pak">1 Pak</option>
        <option value="Dus">1 Dus</option>
        <option value="Pcs">1 Pcs (Umum)</option>
    </select>
</div>
                <div class="relative border-2 border-dashed border-white/20 p-8 text-center rounded-xl">
                    <input type="file" id="fileInput" class="hidden" accept="image/*">
                    <img id="imagePreview" src="" class="hidden absolute inset-0 w-full h-full object-cover rounded-xl">
                    <label for="fileInput" id="labelContent" class="cursor-pointer">
                        <p class="text-slate-400">Klik untuk pilih gambar produk</p>
                    </label>
                </div>

                <button type="submit" class="w-full bg-sky-600 hover:bg-sky-500 font-bold py-4 rounded-xl transition">
                    Simpan ke Database
                </button>
            </form>
        </div>
    </main>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
