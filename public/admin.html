<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - MatrixSphere</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/background.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-8">

    <div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow-lg">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Tambah Produk Baru</h2>
        
        <!-- Form Produk -->
        <form id="admin-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Nama Produk</label>
                <input type="text" id="prod-name" class="w-full p-2 border rounded mt-1" placeholder="Contoh: Voucher Hotspot" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Harga (Angka saja)</label>
                <input type="number" id="prod-price" class="w-full p-2 border rounded mt-1" placeholder="5000" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Kategori</label>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Kategori</label>
                    <input type="text" id="prod-category" list="category-list" class="w-full p-2 border rounded mt-1" placeholder="Ketik atau pilih kategori..." required>
                    <datalist id="category-list">
                        <option value="Voucher Hotspot">
                        <option value="Pulsa & Data">
                        <option value="Pakaian Anak">
                    </datalist>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700">Pilih Foto Produk</label>
                <input type="file" id="prod-img-file" accept="image/*" class="w-full p-2 border rounded mt-1" required>
            </div>
            
            <button type="submit" id="btn-save" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">
                Simpan ke Database
            </button>
        </form>
        <p id="status" class="mt-4 text-center font-medium"></p>
    </div>

    <script type="module" src="js/script.js"></script>
</body>
</html>
