<header class="main-header">
    <div class="nav-container">
        <div class="nav-left-group">
            <a href="index.html" class="nav-logo text-bold text-white flex items-center" style="text-decoration: none;">
                <img src="img/logo.png" alt="Logo" class="logo-round">
                <span
                    class="brand-text ml-4 font-bold text-sky-400 uppercase tracking-widest hidden md:inline">MatrixSphere</span>
            </a>

            <!-- Dropdown Kategori Navbar -->
            <div class="dropdown" id="categoryDropdown">
                <button class="btn text-white text-bold pd-10 hover:text-sky-400 transition-colors">
                    KATEGORI ▾
                </button>
                <div class="dropdown-content card bg-dark shadow-2" id="dropdownCategories"></div>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" id="navSearchInput" class="form-control" placeholder="Cari produk di ShopSphere...">
            <button id="closeSearch" class="hidden text-white px-3 text-lg">✕</button>
        </div>

        <div class="nav-actions">
            <button id="mobileSearchBtn" class="text-white text-xl p-2">🔍</button>
            <a id="notifIcon" href="notifikasi.html" class="icon-badge-container text-white hidden"
                style="text-decoration: none;">
                🔔
                <span class="badge-red hidden" id="notif-badge"></span>
            </a>
            <a id="chatIcon" href="chat.html" class="icon-badge-container text-white hidden"
                style="text-decoration: none;">💬</a>
            <a id="cartIcon" href="cart.html" class="icon-badge-container text-white hidden"
                style="text-decoration: none;">
                🛒<span id="cart-count" class="badge-red" style="display: none;">0</span>
            </a>

            <div class="flex items-center" style="position: relative;" id="profileSection">
                <a href="register.html" id="registerBtn" class="btn bg-blue-600 hover:bg-blue-500 text-white font-bold py-2 px-4 rounded-xl transition-all shadow-md uppercase tracking-wider text-sm mr-2">DAFTAR</a>
                <button id="authBtn" class="btn bg-primary py-2 px-4">MASUK</button>
                <button id="userIcon" class="hidden text-white text-2xl p-2 transition-transform hover:scale-110">👤</button>
                <div id="profileDropdown" class="profile-dropdown">
                    <!-- Bagian Atas: Info User (Klik ke Profil) -->
                    <a href="profile.html" class="no-underline block hover:bg-white/5 transition-colors border-b border-white/10 pt-4 pb-3">
                        <div class="flex flex-col items-center">
                            <img id="userPhoto" src="img/logo.png" class="profile-avatar mb-2" alt="Avatar">
                            <h4 id="userNameDisplay" class="text-sm font-bold text-white truncate w-full text-center px-4">Memuat...</h4>
                            <p id="userEmail" class="text-[10px] text-slate-400 truncate w-full text-center px-4">email@user.com</p>
                        </div>
                    </a>

                    <!-- Bagian Tengah: Tombol Cepat (Setting & Edit Ke Samping) -->
                    <div class="flex border-b border-white/10">
                        <a href="seting.html" class="flex-1 flex items-center justify-center gap-2 py-3 hover:bg-white/5 no-underline text-white text-[10px] border-r border-white/10">
                            <span class="text-sky-400">⚙️</span> Setting
                        </a>
                        <a href="edit-profile.html" class="flex-1 flex items-center justify-center gap-2 py-3 hover:bg-white/5 no-underline text-white text-[10px]">
                            <span class="text-sky-400">✏️</span> Edit Profil
                        </a>
                    </div>

                    <div class="dropdown-box mt-2">
                        <a href="admin/produk.html" id="admin-menu"
                            class="flex items-center gap-3 px-3 py-2 hover:bg-white/5 rounded-lg no-underline text-white text-sm hidden"><span
                                class="text-sky-400">🛠️</span> Kelola Gudang</a>
                        <a href="profile.html"
                            class="flex items-center gap-3 px-3 py-2 hover:bg-white/5 rounded-lg no-underline text-white text-sm"><span
                                class="text-sky-400">🛍️</span> ShopSphere Saya</a>
                        <a href="orders.html"
                            class="flex items-center gap-3 px-3 py-2 hover:bg-white/5 rounded-lg no-underline text-white text-sm"><span
                                class="text-sky-400">📄</span> Nota Digital</a>
                        <button id="logoutBtn"
                            class="flex items-center gap-3 px-3 py-2 hover:bg-red-500/10 text-red-400 rounded-lg text-sm w-full text-left"><span>🚪</span>
                            Keluar Akun</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
