<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk | MatrixSphere</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ui-light.css">
    <link rel="stylesheet" href="css/header.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .login-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s;
        }
        .input-field:focus {
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.08);
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col">
    <!-- Container Navbar Modular -->
    <div id="navbar-container" class="w-full"></div>

    <main class="flex-grow flex items-center justify-center px-5 pt-32 pb-12">
        <div class="login-glass w-full max-w-md p-8 rounded-3xl">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-extrabold text-sky-400 mb-2">Selamat Datang</h1>
                <p class="text-slate-400 text-sm">Masuk ke akun MatrixSphere Anda</p>
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">Email</label>
                    <input type="email" id="email" required 
                        class="input-field w-full px-5 py-3 rounded-xl text-sm" 
                        placeholder="nama@email.com">
                </div>

                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2 ml-1">Kata Sandi</label>
                    <input type="password" id="password" required 
                        class="input-field w-full px-5 py-3 rounded-xl text-sm" 
                        placeholder="••••••••">
                </div>

                <button type="submit" id="btnLogin" 
                    class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-blue-600/20 uppercase tracking-widest text-sm">
                    Masuk
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-slate-400 text-sm">
                    Belum punya akun? 
                    <a href="register.html" class="text-sky-400 font-bold hover:underline ml-1">Daftar di sini</a>
                </p>
            </div>
        </div>
    </main>

    <footer class="py-10 text-center text-slate-500 text-xs">
        &copy; 2024 MatrixSphere Digital Store. All rights reserved.
    </footer>

    <script type="module">
        // Mengambil instance auth yang sudah diinisialisasi di navbar-loader agar sinkron
        import { auth } from './js/navbar-loader.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const loginForm = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Efek Loading
            btnLogin.innerText = "MEMPROSES...";
            btnLogin.disabled = true;
            btnLogin.style.opacity = "0.7";

            try {
                await signInWithEmailAndPassword(auth, email, password);
                // Sukses: Arahkan ke Beranda
                window.location.href = 'index.html';
            } catch (error) {
                console.error("Login Error:", error.code);
                let message = "Gagal masuk. Silakan cek email dan kata sandi Anda.";
                
                if (error.code === 'auth/invalid-credential') message = "Email atau kata sandi salah.";
                if (error.code === 'auth/user-not-found') message = "Akun tidak ditemukan.";
                
                alert(message);
                btnLogin.innerText = "MASUK";
                btnLogin.disabled = false;
                btnLogin.style.opacity = "1";
            }
        });
    </script>
    <script type="module" src="js/navbar-loader.js"></script>
</body>
</html>
