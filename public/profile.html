<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya | MatrixSphere</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .profile-glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Gaya Tab Button */
        .tab-btn {
            color: #94a3b8; /* slate-400 */
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }
        .tab-btn.active {
            background: #0ea5e9 !important; /* sky-500 */
            color: white;
        }
        /* Animasi Transisi Tab */
        .tab-content {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Mencegah konflik z-index leaflet dengan navbar */
        #mapProfile { 
            z-index: 10; 
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col">
    <!-- Container Navbar Modular -->
    <div id="navbar-container" class="w-full"></div>

    <main class="flex-grow flex items-center justify-center px-5 pt-32 pb-12 w-full">
        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center">
            <div class="text-sky-400 animate-pulse text-lg font-bold uppercase tracking-widest">Memuat Profil...</div>
        </div>

        <div class="profile-glass w-full max-w-5xl rounded-3xl overflow-hidden flex flex-col md:flex-row">
            <!-- Sidebar Navigasi Tab -->
            <div class="w-full md:w-72 bg-white/5 border-b md:border-b-0 md:border-r border-white/10 p-6 flex flex-col">
                <div class="mb-8 text-center md:text-left">
                    <div class="w-16 h-16 bg-sky-500/10 border border-sky-400/30 rounded-full flex items-center justify-center text-2xl text-sky-400 mb-4 mx-auto md:mx-0 shadow-lg">
                        👤
                    </div>
                    <h2 id="welcomeText" class="text-lg font-bold text-white truncate">Selamat Datang</h2>
                    <p id="accountStatus" class="text-sky-400 text-[10px] font-bold tracking-widest uppercase">Pelanggan</p>
                </div>

                <nav class="flex md:flex-col gap-2 overflow-x-auto pb-2 md:pb-0">
                    <button data-target="tab-akun" class="tab-btn active flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wider whitespace-nowrap">
                        <span>👤</span> Akun Saya
                    </button>
                    <button data-target="tab-pesanan" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wider whitespace-nowrap">
                        <span>📦</span> Riwayat Pesanan
                    </button>
                    <button data-target="tab-password" class="tab-btn flex items-center gap-3 px-4 py-3 rounded-xl text-xs font-bold uppercase tracking-wider whitespace-nowrap">
                        <span>🔑</span> Ubah Password
                    </button>
                </nav>

                <div class="mt-auto pt-6 border-t border-white/10 hidden md:block">
                    <button id="btnLogoutSidebar" class="flex items-center gap-3 px-4 py-3 text-red-400 hover:bg-red-500/10 rounded-xl text-xs font-bold uppercase tracking-wider w-full transition-all">
                        <span>🚪</span> Keluar Akun
                    </button>
                </div>
            </div>

            <!-- Area Konten Dinamis -->
            <div class="flex-grow p-6 md:p-10">
                <!-- Tab: Akun Saya -->
                <div id="tab-akun" class="tab-content space-y-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 bg-white/5 p-6 rounded-2xl border border-white/10">
                        <div>
                            <label class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Nama Lengkap</label>
                            <p id="userName" class="text-white font-semibold text-lg truncate">-</p>
                        </div>
                        <div>
                            <label class="text-slate-500 text-[10px] uppercase font-bold tracking-widest">Email Terdaftar</label>
                            <p id="userEmail" class="text-white font-semibold text-lg truncate">-</p>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3 class="text-sky-400 text-[10px] font-bold uppercase tracking-widest">Informasi Lokasi Toko</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-2 block">Deskripsi Toko</label>
                                <textarea id="shopDescriptionInput" readonly class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white text-sm opacity-70 cursor-not-allowed" rows="2"></textarea>
                            </div>
                            <div>
                                <label class="text-slate-500 text-[10px] uppercase font-bold tracking-widest mb-2 block">Alamat Pengambilan</label>
                                <textarea id="shopAddressInput" readonly class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-white text-sm opacity-70 cursor-not-allowed" rows="2"></textarea>
                            </div>
                        </div>
                        
                        <div id="mapProfile" class="w-full h-64 rounded-2xl border border-white/10 shadow-xl overflow-hidden"></div>
                        
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="text-slate-500 text-[8px] uppercase font-bold tracking-widest block mb-1">Latitude</label>
                                <input type="text" id="latInput" readonly class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-[10px] text-slate-400" placeholder="Lat">
                            </div>
                            <div class="flex-1">
                                <label class="text-slate-500 text-[8px] uppercase font-bold tracking-widest block mb-1">Longitude</label>
                                <input type="text" id="lngInput" readonly class="w-full bg-white/5 border border-white/10 rounded-lg p-2 text-[10px] text-slate-400" placeholder="Lng">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab: Riwayat Pesanan -->
                <div id="tab-pesanan" class="tab-content hidden">
                    <div class="text-center py-20 bg-white/5 rounded-2xl border border-dashed border-white/20">
                        <span class="text-4xl block mb-4">📦</span>
                        <h3 class="text-white font-bold mb-2">Belum Ada Pesanan</h3>
                        <p class="text-slate-400 text-sm">Riwayat transaksi Anda akan muncul di sini.</p>
                    </div>
                </div>

                <!-- Tab: Ubah Password -->
                <div id="tab-password" class="tab-content hidden">
                    <div class="max-w-md space-y-6">
                        <div class="bg-blue-500/10 border border-blue-500/20 p-4 rounded-xl text-xs text-blue-300">
                            Gunakan tombol di bawah untuk mengirim email pemulihan kata sandi ke alamat Anda.
                        </div>
                        <button class="w-full bg-sky-600 hover:bg-sky-500 text-white font-bold py-4 rounded-xl transition-all shadow-lg uppercase tracking-widest text-xs">
                            Kirim Link Reset Password
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Logout Mobile -->
        <div class="mt-6 md:hidden w-full max-w-md px-5">
            <button id="btnLogoutMobile" class="w-full bg-red-600/20 hover:bg-red-600 text-red-400 hover:text-white font-bold py-4 rounded-2xl border border-red-600/30 transition-all text-xs uppercase tracking-widest">
                Keluar Akun
            </button>
        </div>
    </main>

    <footer class="py-10 text-center text-slate-500 text-[10px] uppercase tracking-widest">
        &copy; 2024 MatrixSphere Digital Store. All rights reserved.
    </footer>

    <script type="module">
        // Mengambil instance auth yang sudah diinisialisasi di navbar-loader
        import { auth, app } from './js/navbar-loader.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const db = getFirestore(app);
        const loadingOverlay = document.getElementById('loadingOverlay');
        const welcomeText = document.getElementById('welcomeText');
        const userName = document.getElementById('userName');
        const userEmail = document.getElementById('userEmail');
        const btnLogout = document.getElementById('btnLogout');
        const shopDescriptionInput = document.getElementById('shopDescriptionInput');
        const shopAddressInput = document.getElementById('shopAddressInput');
        const latInput = document.getElementById('latInput');
        const lngInput = document.getElementById('lngInput');

        const ADMIN_EMAIL = "dani6385@gmail.com";
        // 1. Koordinat Default (Sukagalih Cikalongkulon)
        const defaultLat = "-6.714104";
        const defaultLng = "107.216327";

        // 2. Inisialisasi Peta Leaflet
        const map = L.map('mapProfile').setView([parseFloat(defaultLat), parseFloat(defaultLng)], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Marker statis (tidak bisa digeser di halaman profil)
        const marker = L.marker([parseFloat(defaultLat), parseFloat(defaultLng)], { draggable: false }).addTo(map);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const name = user.displayName || "User";
                welcomeText.innerText = `Selamat Datang, ${name}`;
                userName.innerText = name;
                userEmail.innerText = user.email;

                // Muat Data Lokasi dari Firestore (Universal)
                try {
                    const docRef = doc(db, "toko_settings", "lokasi_utama");
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        shopDescriptionInput.value = data.deskripsi || "";
                        shopAddressInput.value = data.alamat || "";
                        latInput.value = data.latitude || defaultLat;
                        lngInput.value = data.longitude || defaultLng;

                        const newPos = [parseFloat(latInput.value), parseFloat(lngInput.value)];
                        marker.setLatLng(newPos);
                        map.setView(newPos, 15);
                    }
                } catch (error) {
                    console.error("Gagal sinkronisasi Firestore:", error);
                }

                map.invalidateSize(); // Refresh ukuran peta setelah loading selesai

                loadingOverlay.style.display = 'none';
            } else {
                window.location.href = 'login.html';
            }
        });

        // 3. Logika Tab Switching
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');

        tabBtns.forEach(btn => {
            btn.onclick = () => {
                const targetId = btn.getAttribute('data-target');

                // Reset UI Tombol
                tabBtns.forEach(b => b.classList.remove('active', 'bg-sky-500', 'text-white'));
                tabBtns.forEach(b => b.classList.add('text-slate-400', 'hover:bg-white/5'));
                btn.classList.add('active', 'bg-sky-500', 'text-white');
                btn.classList.remove('text-slate-400', 'hover:bg-white/5');

                // Ganti Konten
                tabContents.forEach(content => content.classList.add('hidden'));
                document.getElementById(targetId).classList.remove('hidden');

                // Paksa peta refresh jika tab akun dibuka
                if (targetId === 'tab-akun' && map) {
                    setTimeout(() => map.invalidateSize(), 200);
                }
            };
        });

        // 4. Logika Logout (Multi-Button)
        const handleLogout = async () => {
            if (!confirm("Apakah Anda yakin ingin keluar dari akun MatrixSphere?")) return;
            try { await signOut(auth); window.location.href = 'index.html'; } 
            catch (error) { alert("Gagal keluar akun: " + error.message); }
        };
        document.getElementById('btnLogoutSidebar').onclick = handleLogout;
        document.getElementById('btnLogoutMobile').onclick = handleLogout;
    </script>
    <script type="module" src="js/navbar-loader.js"></script>
</body>
</html>
