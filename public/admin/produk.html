<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gudang Produk - MatrixSphere</title>
    <script src="../js/auth-guard.js"></script>
    <link rel="icon" type="image/png" href="../img/favicon.png">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="bg-slate-900 text-white font-sans" style="height: auto; overflow-y: auto; display: block;">
        <!-- Container Navbar Modular -->
        <div id="navbar-container"></div>

        <main class="container" style="padding-top: 130px; padding-bottom: 50px;">
            <div class="glass-box pd-20">
                <!-- Container utama yang membungkus Judul & Pencarian -->
                <div class="inventory-top-header" style="flex-direction: column; align-items: flex-start; gap: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                        <h2 class="text-matrix" style="margin: 0; font-size: 2.5rem; font-weight: 800; line-height: 1.2;">KETERSEDIAAN</h2>
                        <div class="header-search">
                            <input type="text" placeholder="Cari di gudang..." class="form-control-md"
                                style="background: rgba(255,255,255,0.1); color: white; border: 1px solid #20a8d8; width: 250px;">
                        </div>
                    </div>

                    <div class="header-info" style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 5px;">
                        <p class="text-white" style="opacity: 0.7; margin: 0;">Pantau stok dan harga produk aktif Anda.</p>
                        
                        <div class="btn-group-stack" style="display: flex; gap: 10px; align-items: center;">
                            <a href="add.html" class="btn"
                                style="background: #20a8d8; color: white; padding: 10px 15px; border-radius: 5px; font-size: 12px; font-weight: bold; text-decoration: none; display: inline-block;">
                                TAMBAH BARANG
                            </a>
                            <input type="file" id="importExcel" style="display: none;" accept=".xlsx, .xls">
                            <button onclick="document.getElementById('importExcel').click()" class="btn"
                                style="background: #10b981; color: white; padding: 10px 15px; border-radius: 5px; font-size: 12px; font-weight: bold;">
                                IMPORT EXCEL
                            </button>
                            <button onclick="exportKeExcel()" class="btn"
                                style="background: #3b82f6; color: white; padding: 10px 15px; border-radius: 5px; font-size: 12px; font-weight: bold;">
                                EXPORT EXCEL
                            </button>
                        </div>
                    </div>
                </div>

                <div style="overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; color: white; text-align: left;">
                        <thead>
                            <tr style="border-bottom: 2px solid #20a8d8; background: rgba(32, 168, 216, 0.1);">
                                <th style="padding: 15px;">Gambar</th>
                                <th style="padding: 15px;">Nama Produk</th>
                                <th style="padding: 15px;">Kategori</th>
                                <th style="padding: 15px;">Harga</th>
                                <th style="padding: 15px;">Stok</th>
                                <th style="padding: 15px;">Status</th>
                                <th style="padding: 15px;" class="hide-column">Deskripsi</th>
                                <th style="padding: 15px;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="productTableBody">
                        </tbody>
                    </table>
                    <div id="paginationContainer" style="margin-top: 20px; text-align: center;"></div>
                </div>
            </div>
        </main>

        <script type="module">
            // Mengambil fungsi dari manager yang sudah kita pisah
            import { monitorGudang, importExcelKeFirebase, getFirebaseData } from '../js/inventory-manager.js';

            const tableBody = document.getElementById('productTableBody');
            const paginationContainer = document.getElementById('paginationContainer');
            
            // Ambil halaman saat ini dari URL
            const urlParams = new URLSearchParams(window.location.search);
            let currentPage = parseInt(urlParams.get('page')) || 1;
            const itemsPerPage = 20;

            window.keHalamanEdit = (id) => {
                if (id) window.location.href = `add.html?id=${id}`;
                else alert("ID Produk tidak ditemukan!");
            };

            // --- A. MENAMPILKAN DATA DARI FIREBASE (REALTIME) ---
            monitorGudang((data) => {
                if (!tableBody) return;
                tableBody.innerHTML = ""; // Bersihkan tabel

                // Jika data di Firebase kosong, tampilkan pesan
                if (data.length === 0) {
                    tableBody.innerHTML = "<tr><td colspan='8' style='text-align:center; padding:20px;'>Database Kosong. Silahkan Import Excel.</td></tr>";
                    return;
                }

                // Logika Paginasi
                const totalPages = Math.ceil(data.length / itemsPerPage);
                if (currentPage > totalPages) currentPage = totalPages;
                
                const startIndex = (currentPage - 1) * itemsPerPage;
                const endIndex = startIndex + itemsPerPage;
                const paginatedData = data.slice(startIndex, endIndex);

                paginatedData.forEach(item => {
                    // Proxy gambar menggunakan weserv.nl jika URL adalah link eksternal (http/https)
                    const originalImg = item.img || '../img/logo.png';
                    const urlGambarAman = originalImg.startsWith('http') 
                        ? `https://images.weserv.nl/?url=${originalImg.replace('https://', '')}` 
                        : originalImg;

                    tableBody.innerHTML += `
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer;" 
                    onclick="window.location.href='detail.html?id=${item.id}'">
                    <td style="padding: 10px; text-align: center;" onclick="window.location.href='detail.html?id=${item.id}'">
                         <img src="${urlGambarAman}" style="width:50px; height:50px; border-radius:5px; object-fit:cover;" onerror="this.onerror=null;this.src='../img/logo.png';">
                    </td>
                    <td style="padding: 15px;" onclick="window.location.href='detail.html?id=${item.id}'">${item.nama}</td>
                    <td style="padding: 15px;" onclick="window.location.href='detail.html?id=${item.id}'">
                        <span style="background: #1e293b; padding: 5px 10px; border-radius: 5px; font-size: 12px;">${item.kategori}</span>
                    </td>
                    <td style="padding: 15px;">Rp ${Number(item.harga).toLocaleString('id-ID')}</td>
                    <td style="padding: 15px;">${item.stok}</td>
                    <td style="padding: 15px;"><span style="color: #4ade80;">● Tersedia</span></td>
                    <td style="padding: 15px;" class="hide-column">
                        ${item.deskripsi || item.detail || "-"}
                    </td>
                    <td style="padding: 15px;">
                        <button onclick="event.stopPropagation(); keHalamanEdit('${item.id}')" 
                class="btn pd-5" 
                style="background: #f59e0b; color: white; border-radius: 5px; cursor: pointer; padding: 5px 15px;">
            Edit
        </button>
                    </td>
                </tr>`;
                });

                renderPaginationLinks(totalPages);
            });

            function renderPaginationLinks(total) {
                if (!paginationContainer) return;
                paginationContainer.innerHTML = "";
                
                for (let i = 1; i <= total; i++) {
                    const isActive = i === currentPage;
                    paginationContainer.innerHTML += `
                        <a href="produk.html?page=${i}" class="btn" 
                           style="background: ${isActive ? '#20a8d8' : 'rgba(255,255,255,0.1)'}; 
                                  margin: 0 5px; padding: 5px 15px; min-width: 40px; display: inline-block;">
                           ${i}
                        </a>`;
                }
            }

            // --- B. FUNGSI EXPORT (Global agar bisa dipanggil tombol) ---
            window.exportKeExcel = async () => {
                const data = await getFirebaseData();
                if (data.length === 0) return alert("Tidak ada data untuk di-export");

                const worksheet = XLSX.utils.json_to_sheet(data);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Gudang_Firebase");
                XLSX.writeFile(workbook, "Data_Gudang_MatrixSphere.xlsx");
            };

            // --- C. FUNGSI IMPORT (MENGIRIM KE FIREBASE) ---
            const importInput = document.getElementById('importExcel');
            if (importInput) {
                importInput.addEventListener('change', function (e) {
                    const file = e.target.files[0];
                    const reader = new FileReader();

                    reader.onload = async (event) => {
                        const dataArray = new Uint8Array(event.target.result);
                        const workbook = XLSX.read(dataArray, { type: 'array' });
                        const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                        // Kirim data ke Firebase melalui Manager
                        const res = await importExcelKeFirebase(json);
                        if (res.success) {
                            alert("Berhasil Sinkronisasi ke Cloud Firebase!");
                        } else {
                            alert("Gagal: " + res.error);
                        }
                    };
                    reader.readAsArrayBuffer(file);
                });
            }
        </script>
        <script src="../js/xlsx.full.min.js"></script>
        <script src="../js/navbar-loader.js" type="module"></script>
    </body>

</html>
