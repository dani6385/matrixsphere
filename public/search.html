<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pencarian Produk - MatrixSphere</title>
    
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/background.css">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        /* Samakan style dengan index.html */
        .index-content {
            padding-top: 100px;
            min-height: 100vh;
        }
        body {
            background-color: #0f172a;
        }
    </style>
</head>
<body class="text-white">

    <nav class="nav-bar-split">
        <div class="nav-group-left">
            <a href="index.html">
                <img src="img/logo_shop.png" alt="MatrixSphere Logo" class="auth-logo-nav">
            </a>
        </div>

        <div class="search-container">
            <input type="text" id="searchPageInput" class="search-input" placeholder="Cari produk lain di MatrixSphere...">
        </div>

        <div class="nav-icons flex space-x-4">
            <a href="cart.html"><img src="img/cart.png" alt="Cart" class="w-6 h-6 invert"></a>
            <a href="notifications.html"><img src="img/bell.png" alt="Notif" class="w-6 h-6 invert"></a>
            <a href="chat.html"><img src="img/chat.png" alt="Chat" class="w-6 h-6 invert"></a>
        </div>
    </nav>

    <div class="index-content container mx-auto px-4">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-sky-400">Hasil Pencarian</h1>
            <p class="text-slate-400">Menampilkan hasil untuk: <span id="queryText" class="text-white font-bold italic">...</span></p>
        </div>

        <div id="searchResults" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <p class="col-span-full text-center py-20 text-slate-500 italic">Mencari barang di gudang...</p>
        </div>
    </div>

    <script type="module" src="js/search.js"></script>
</body>
</html>
